# =============================================================================
# BOBATHON SCHEDULE (6 hours)
# =============================================================================
schedule:
  total_duration_hours: 6
  date: "2026-04-15"
  timezone: "Asia/Saigon (UTC+7)"
  
  # Morning Session: Introduction and Core Features (3 hours)
  morning_session:
    start_time: "09:00"
    end_time: "12:00"
    duration_minutes: 180
    
    segments:
      - name: "Introduction & Setup"
        start_time: "09:00"
        duration_minutes: 30
        topics:
          - "Welcome and team introductions"
          - "Bobathon objectives for RealDataTeam"
          - "Bob overview: What is Bob and what can it do?"
          - "Environment setup verification"
          - "Q&A: Initial questions"
        deliverables:
          - "All participants have Bob running"
          - "Understanding of bobathon goals"
          - "Python/Kafka/Spark environment verified"
      
      - name: "Basic Bob Features"
        start_time: "09:30"
        duration_minutes: 90
        topics:
          - "Core commands and navigation"
          - "Working with Python code"
          - "File operations (read, write, edit)"
          - "Code analysis and understanding (literate coding)"
          - "Basic tool usage (execute_command, search_files)"
          - "Working with Kafka and Spark code"
          - "Bob Modes: Ask, Plan, and Code"
          - "Bob Findings: Automated security and quality analysis"
          - "Auto-approval for trusted operations"
          - "Best practices for prompting Bob"
        hands_on:
          - lab_id: "lab1"
          - duration: 30
          - description: "Guided exercises with Python/Kafka code"
        deliverables:
          - "Comfort with basic Bob commands"
          - "Understanding of Bob modes and when to use them"
          - "Awareness of Bob Findings capabilities"
          - "Completed Lab 1 exercises"
      
      - name: "Advanced Bob Features"
        start_time: "11:00"
        duration_minutes: 60
        topics:
          - "Complex workflows and multi-step tasks"
          - "Working with multiple files simultaneously"
          - "Code refactoring and optimization"
          - "Debugging distributed systems"
          - "Using apply_diff for precise changes"
          - "Bob Differentiators: What makes Bob unique"
          - "MCP servers and integrations (extensibility)"
          - "Intelligent model selection and context optimization"
          - "Leveraging modes in complex workflows"
        hands_on:
          - lab_id: "lab2"
          - duration: 30
          - description: "Advanced stream processing scenarios"
        deliverables:
          - "Understanding of advanced capabilities"
          - "Awareness of Bob's unique differentiators"
          - "Completed Lab 2 exercises"
  
  # Lunch Break
  lunch_break:
    start_time: "12:00"
    end_time: "13:00"
    duration_minutes: 60
  
  # Afternoon Session: RealDataTeam-Specific Application (3 hours)
  afternoon_session:
    start_time: "13:00"
    end_time: "16:00"
    duration_minutes: 180
    
    segments:
      - name: "RealDataTeam-Specific Use Cases"
        start_time: "13:00"
        duration_minutes: 150
        topics:
          - "Stream processing pipeline development"
          - "Data quality validation implementation"
          - "Real-time analytics patterns"
          - "Performance optimization techniques"
          - "Best practices for RealDataTeam's tech stack"
          - "Integration with on-premise infrastructure"
        hands_on:
          - lab_id: "lab3"
          - duration: 90
          - description: "Work on actual RealDataTeam scenarios"
        deliverables:
          - "Stream processing pipeline implemented"
          - "Data quality validation in place"
          - "Real-time analytics operational"
          - "Performance optimizations applied"
          - "Completed Lab 3 with real use cases"
      
      - name: "Wrap-up & Next Steps"
        start_time: "15:30"
        duration_minutes: 30
        topics:
          - "Key takeaways and lessons learned"
          - "Resources for continued learning"
          - "Support channels and escalation"
          - "Action items and follow-up"
          - "Feedback and Q&A"
        deliverables:
          - "Action plan for Bob adoption"
          - "List of resources and contacts"
          - "Feedback collected"

# =============================================================================
# LAB EXERCISES
# =============================================================================
labs:
  # Code generation strategy for Labs 1 & 2 (REQUIRED - must be set during bobathon setup)
  # Options: both_starter_and_solutions | starter_only | solutions_only | live_generation | no_generation
  code_generation_strategy: "both_starter_and_solutions"
  
  # Lab 3 code source (REQUIRED - must be set during bobathon setup)
  # Options: customer_codebase | sample_code | hybrid | no_code
  lab3_code_source: "sample_code"
  lab3_code_details: "Sample code will be generated matching RealDataTeam's Python/Kafka/Spark stack, including realistic stream processing pipelines, data quality validation, and real-time analytics scenarios."
  
  - id: "lab1"
    name: "Basic Bob Operations with Python"
    duration_minutes: 30
    difficulty: "beginner"
    objectives:
      - "Navigate Python project structure"
      - "Read and analyze Kafka consumer code"
      - "Make simple code changes"
      - "Run pytest tests"
    prerequisites:
      - "Bob installed and running"
      - "Access to sample Python/Kafka project"
      - "Python 3.9+ installed"
    exercises:
      - "Read and analyze a Kafka consumer implementation"
      - "Update configuration for a data stream"
      - "Add a new data transformation"
      - "Run unit tests to verify changes"
    
  - id: "lab2"
    name: "Advanced Stream Processing"
    duration_minutes: 30
    difficulty: "intermediate"
    objectives:
      - "Refactor stream processing logic"
      - "Improve code quality and performance"
      - "Add comprehensive error handling"
      - "Update integration tests"
    prerequisites:
      - "Completed Lab 1"
      - "Understanding of Kafka and Spark"
    exercises:
      - "Refactor Kafka message processing logic"
      - "Add proper exception handling for stream failures"
      - "Implement retry mechanisms"
      - "Update tests for new behavior"
    
  - id: "lab3"
    name: "RealDataTeam Real-time Processing Implementation"
    duration_minutes: 90
    difficulty: "advanced"
    objectives:
      - "Build production-ready stream processing pipeline"
      - "Implement data quality validation"
      - "Create real-time analytics"
      - "Optimize for performance"
    prerequisites:
      - "Completed Labs 1 and 2"
      - "Access to RealDataTeam codebase/environment"
    exercises:
      - "Implement Kafka consumer with data validation"
      - "Add data quality checks and anomaly detection"
      - "Create real-time aggregations and windowing"
      - "Optimize pipeline performance"

